<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="content">
        <header>
            <img src="logo.png">
            <h1 class="logo-text">Taking Booleaners from A to B</h1>
        </header>

        <nav>
            <div class="bar-nav">
                <button>Prenota</button>
                <button>Termina prenotazione</button>
                <button>Accendi le luci</button>
            </div>
        </nav>

        <main>
            <div class="model">
                <input type="checkbox">	
                <span class="monopattino">Monopattino Gino22</span>
                <h2>&#8614 Via Guadalametri - a 200 metri da te</h2>
                <h2>Stato carica:</h2>
                <div class="medium-charge"></div>                  
            </div>

            <div class="model">
                <input type="checkbox">
                <span class="monopattino">Monopattino Mike24</span>
                <h2>&#8614 Via Ricciardoni - a 420 metri da te</h2>
                <h2>Stato carica:</h2>
                <div class="full-charge"></div>                  
            </div>

            <div class="model">
                <input type="checkbox">
                <span class="monopattino">Monopattino Fede154</span>
                <h2>&#8614 Via Mentarini - a 490 metri da te</h2>
                <h2>Stato carica:</h2>
                <div class="low-charge"></div>                  
            </div>
        </main>
    </div>
    
</body>
</html>
